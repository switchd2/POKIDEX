version: "3.9"

services:
  postgres:
    image: docker.io/postgres:16
    container_name: pokewiki_postgres
    restart: always
    environment:
      POSTGRES_DB: pokewiki
      POSTGRES_USER: pokewiki
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokewiki"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/redis:7-alpine
    container_name: pokewiki_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
