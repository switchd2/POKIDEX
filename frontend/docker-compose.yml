version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pokewiki
      POSTGRES_USER: pokewiki
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://pokewiki:password@postgres:5432/pokewiki
      REDIS_URL: redis://redis:6379
      JWT_SECRET: "your-secret-key-at-least-32-chars-long"
      PORT: 4000
      IMAGE_STORAGE_PATH: "./public/sprites"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api/v1

volumes:
  postgres_data:
